<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Terrain Email Signature Generator</title>
  <style>
    :root {
      --bg: #f3f7f6;
      --surface: #ffffff;
      --surface-alt: #eef5f2;
      --ink: #182525;
      --muted: #526160;
      --border: #ccd9d6;
      --accent: #176c62;
      --accent-strong: #0f4d47;
      --danger: #9a3412;
      --shadow: 0 12px 30px rgba(24, 37, 37, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    body.dark-mode {
      --bg: #172323;
      --surface: #223130;
      --surface-alt: #1b2928;
      --ink: #f6f5ef;
      --muted: #c6d1cc;
      --border: #3d514f;
      --accent: #9abf85;
      --accent-strong: #bdd8ad;
      --shadow: none;
    }

    a {
      color: var(--accent-strong);
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand-mark {
      display: block;
      width: 220px;
      max-width: 48vw;
      height: auto;
    }

    h1,
    h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.15;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 390px) 1fr;
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }

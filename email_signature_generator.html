<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Terrain Email Signature Generator</title>
  <style>
    :root {
      --storm-slate: #2B2D35;
      --stone-white: #F5F3EE;
      --fell-violet: #4A4560;
      --mist: #8890A0;
      --moorland-amber: #C89030;
      --amber-dark: #8A6010;
      --sage-fell: #6B8A6F;
      --bg: var(--stone-white);
      --surface: var(--stone-white);
      --surface-alt: var(--mist);
      --ink: var(--storm-slate);
      --muted: var(--fell-violet);
      --border: var(--mist);
      --accent: var(--moorland-amber);
      --accent-strong: var(--amber-dark);
      --danger: var(--fell-violet);
      --shadow: 0 12px 30px rgba(43, 45, 53, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    body.dark-mode {
      --bg: var(--storm-slate);
      --surface: var(--fell-violet);
      --surface-alt: var(--storm-slate);
      --ink: var(--stone-white);
      --muted: var(--mist);
      --border: var(--mist);
      --accent: var(--moorland-amber);
      --accent-strong: var(--moorland-amber);
      --shadow: none;
    }

    a {
      color: var(--accent-strong);
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand-mark {
      display: block;
      width: 220px;
      max-width: 48vw;
      height: auto;
    }

    h1,
    h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.15;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
